<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      width: 300px;
      margin: 0;
      padding: 14px;
      font: 14px/1.4 -apple-system, system-ui, sans-serif;
      background: #fff;
      color: #111;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; color: #eee; }
      .btn { background: #2c2c2c; border-color: #3a3a3a; color: #eee; }
      .btn:hover { background: #383838; }
    }

    h1 {
      font-size: 15px;
      margin: 0 0 10px;
    }

    #title {
      font-size: 12px;
      opacity: .65;
      margin: 0 0 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      background: #f7f7f7;
      color: #111;
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .btn:hover { background: #efefef; }
    .btn svg { flex: 0 0 18px; width: 18px; height: 18px; }
    .btn.full { grid-column: 1 / -1; }

    #toast {
      margin-top: 10px;
      font-size: 12px;
      color: #16a34a;
      min-height: 15px;
      text-align: center;
    }

    footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e2e2e2;
      font-size: 11px;
      text-align: center;
      opacity: .7;
    }

    footer a { color: inherit; }

    @media (prefers-color-scheme: dark) {
      footer { border-top-color: #3a3a3a; }
    }
  </style>
</head>
